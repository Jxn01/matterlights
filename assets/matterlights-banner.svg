    <rect x="860" y="338" width="24" height="34" rx="10" fill="#D7E7FF" />
    <path d="M838 301C838 279.46 855.46 262 877 262C898.54 262 916 279.46 916 301C916 322.54 898.54 340 877 340H867C851.536 340 838 326.464 838 311V301Z" fill="rgba(125,211,252,0.14)" />

    <circle cx="998" cy="382" r="58" fill="#0B1220" stroke="rgba(255,255,255,0.14)" stroke-width="2" />
