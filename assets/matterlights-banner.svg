<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">MatterLights banner</title>
  <desc id="desc">Stylized banner showing a glowing monitor, ambient light bulbs, and the MatterLights name.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="70" x2="1180" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F" />
      <stop offset="0.5" stop-color="#101C30" />
      <stop offset="1" stop-color="#291616" />
    </linearGradient>
    <linearGradient id="screenGlow" x1="360" y1="170" x2="862" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7F9" />
      <stop offset="0.52" stop-color="#B794F4" />
      <stop offset="1" stop-color="#F59E0B" />
    </linearGradient>
    <radialGradient id="ambientA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(231 172) rotate(24.8) scale(213 193)">
      <stop stop-color="#7DD3FC" stop-opacity="0.65" />
      <stop offset="1" stop-color="#7DD3FC" stop-opacity="0" />
